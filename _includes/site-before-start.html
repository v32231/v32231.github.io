<style>

html {
  scrollbar-gutter: stable;
}

@font-face {
  font-family: 'PyeojinGothic';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Light.woff2') format('woff2');
  font-weight: 300;
  font-display: swap;
}

@font-face {
  font-family: 'PyeojinGothic';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Regular.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}

@font-face {
  font-family: 'PyeojinGothic';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Bold.woff2') format('woff2');
  font-weight: 700;
  font-display: swap;
}

.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #d63384;
  backdrop-filter: blur(8px);
}

.header .item--nav:first-child a {
  font-weight: 700;
}

.header .item--nav:first-child {
  margin-right: auto;
}

.header .item--nav:first-child a::after {
  content: "|";
  margin-left: 1rem;
  color: #ffffff;
}

.header .item--nav {
  flex: 0 0 auto;
}

.header .item--nav a {
  white-space: nowrap;
}

.header .item--nav:not(:first-child) a {
  display: inline-block;
  position: relative;
  transition: color 0.18s ease;
}

.header .item--nav:not(:first-child) a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -0.15rem;
  width: 100%;
  height: 2px;
  background: #ffffff;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.18s ease;
}

.header .item--nav:not(:first-child) a:hover::after,
.header .item--nav:not(:first-child) a:focus::after {
  transform: scaleX(1);
}

.header .container {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: none;
  padding: 1rem 1.55rem 1rem 1.05rem;
}

.header .nav--header {
  width: 100%;
  margin: 0;
  overflow-x: auto;
}

.header .list--nav {
  display: flex;
  align-items: center;
  width: 100%;
  justify-content: flex-start;
  gap: 0.75rem;
  flex-wrap: nowrap;
}

.profile-img {
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 50%;
}

.career-box {
  display: block;
  padding: 1rem 3rem;
  margin: 1.5rem 0;
  border-radius: 16px;
  background: #ffeaf8;
}

.career-box summary {
  cursor: pointer;
  color: #666;
}

.career-box summary::after {
  content: "▸";
  margin-left: 0.5rem;
}

.career-box[open] summary::after {
  content: "▾";
}

.career-title {
  font-size: 1.4rem;
  font-weight: 700;
}

.intro-box {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.intro-info {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.15rem;
  padding-left: 1.1rem;
}

.intro-info::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0.2rem;
  bottom: 0.2rem;
  width: 0.35rem;
  border-radius: 999px;
  background: #f2a8cb;
}

.intro-text {
  margin: 0;
  font-size: 1.3rem;
}

.typeset .intro-text {
  margin: 0;
  margin-bottom: 0;
  padding-top: 0;
  line-height: 1.35;
}

.typeset .intro-text a,
.typeset .intro-text a:visited {
  color: #d63384;
  background-image: none;
  text-shadow: none;
}

.typeset .intro-text a:hover,
.typeset .intro-text a:focus {
  color: #b91c6b;
  background-image: none;
}

body,
.typeset,
.header,
.nav a,
summary,
h1, h2, h3, h4, h5, h6{
  font-family: 'PyeojinGothic', sans-serif !important;
}

.typeset a,
.nav a,
.toc a {
  color: #ffebf5;
}

.header .nav a,
.header .nav a:visited,
.header .nav a:hover,
.header .nav a:focus {
  color: #ffffff;
}

.post-meta,
.post-meta a,
.label--category a {
  color: #b31268 !important;
}

.label--category a {
  font-weight: 700;
}

.typeset p a,
.typeset li a {
  color: #b31268 !important;
  background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0) 50%, #b31268 50%) !important;
}

.typeset p a:hover,
.typeset p a:focus,
.typeset p a:active,
.typeset li a:hover,
.typeset li a:focus,
.typeset li a:active {
  color: #8f0f52 !important;
  background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0) 50%, #8f0f52 50%) !important;
}

.typeset table {
  display: block;
  width: 100%;
  max-width: 100%;
  margin: 1.25rem 0 1.75rem;
  overflow-x: auto;
  border-collapse: collapse;
  border-spacing: 0;
  font-size: 0.95rem;
  line-height: 1.55;
}

.typeset table thead,
.typeset table tbody,
.typeset table tr {
  width: 100%;
}

.typeset table th,
.typeset table td {
  padding: 0.65rem 0.85rem;
  border: 1px solid #f1bad5;
  vertical-align: top;
  word-break: keep-all;
  overflow-wrap: break-word;
}

.typeset table th {
  background: #ffe5f3;
  color: #8f0f52;
  font-weight: 700;
  text-align: left;
}

.typeset table td {
  background: #ffffff;
}

.typeset table tbody tr:nth-child(even) td {
  background: #fff7fb;
}

.typeset table tbody tr:hover td {
  background: #fff0f8;
}

.typeset table th:first-child,
.typeset table td:first-child {
  white-space: nowrap;
}

@media (max-width: 720px) {
  .typeset table {
    font-size: 0.88rem;
  }

  .typeset table th,
  .typeset table td {
    padding: 0.55rem 0.7rem;
  }
}

</style>
