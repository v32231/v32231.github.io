<style>

html {
  scrollbar-gutter: stable;
}

@font-face {
  font-family: 'PyeojinGothic';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Light.woff2') format('woff2');
  font-weight: 300;
  font-display: swap;
}

@font-face {
  font-family: 'PyeojinGothic';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Regular.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}

@font-face {
  font-family: 'PyeojinGothic';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Bold.woff2') format('woff2');
  font-weight: 700;
  font-display: swap;
}

.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #d63384;
  backdrop-filter: blur(8px);
}

.header .item--nav:first-child a {
  font-weight: 700;
}

.header .item--nav:first-child {
  margin-right: auto;
}

.header .item--nav:first-child a::after {
  content: "|";
  margin-left: 1rem;
  color: #ffffff;
}

.header .item--nav {
  flex: 0 0 auto;
}

.header .item--nav a {
  white-space: nowrap;
}

.header .container {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: none;
  padding: 1rem 1.55rem 1rem 1.05rem;
}

.header .nav--header {
  width: 100%;
  margin: 0;
  overflow-x: auto;
}

.header .list--nav {
  display: flex;
  align-items: center;
  width: 100%;
  justify-content: flex-start;
  gap: 0.75rem;
  flex-wrap: nowrap;
}

.profile-img {
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 50%;
}

.career-box {
  display: block;
  padding: 1rem 3rem;
  margin: 1.5rem 0;
  border-radius: 16px;
  background: #ffeaf8;
}

.career-box summary {
  cursor: pointer;
  color: #666;
}

.career-box summary::after {
  content: "▸";
  margin-left: 0.5rem;
}

.career-box[open] summary::after {
  content: "▾";
}

.career-title {
  font-size: 1.4rem;
  font-weight: 700;
}

.intro-box {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.intro-text {
  margin: 0;
  font-size: 1.3rem;
}

body,
.typeset,
.header,
.nav a,
summary,
h1, h2, h3, h4, h5, h6{
  font-family: 'PyeojinGothic', sans-serif !important;
}

.typeset a,
.nav a,
.toc a {
  color: #ffebf5;
}

.header .nav a,
.header .nav a:visited,
.header .nav a:hover,
.header .nav a:focus {
  color: #ffffff;
}

</style>
