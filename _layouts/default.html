<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ko' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    {% assign current_url = page.url | replace: 'index.html', '' %}
    <div class="site-shell">
      <header class="site-header">
        <div class="content-shell header-inner">
          <a class="brand" href="{{ '/' | relative_url }}">
            <span class="brand-mark">v</span>
            <span class="brand-copy">
              <strong>{{ site.title }}</strong>
              <span>{{ site.description }}</span>
            </span>
          </a>
          <nav class="site-nav" aria-label="주요 메뉴">
            <a class="nav-link {% if current_url == '/' %}is-active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
            <a class="nav-link {% if current_url contains '/categories/' %}is-active{% endif %}" href="{{ '/categories/' | relative_url }}">Categories</a>
          </nav>
        </div>
      </header>

      <main class="site-main">
        <div class="content-shell">
          {{ content }}
        </div>
      </main>

      <footer class="site-footer">
        <div class="content-shell footer-inner">
          <p>{{ site.title }}</p>
          <p><a href="{{ site.url }}">{{ site.url }}</a></p>
        </div>
      </footer>
    </div>
  </body>
</html>
