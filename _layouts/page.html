---
layout: default
---
<section class="page-hero">
  <p class="eyebrow">{{ page.eyebrow | default: 'Page' }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.description %}
    <p class="page-description">{{ page.description }}</p>
  {% endif %}
</section>

<section class="panel rich-content">
  {{ content }}
</section>
